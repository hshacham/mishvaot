<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>תרגול משוואות ריבועיות — עמקים-תבור</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',Tahoma,Arial,sans-serif;
      background:linear-gradient(135deg,#4a3f8f 0%,#7b2fbe 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
    }
    .screen{display:none;width:100%;max-width:560px}
    .screen.active{display:block}
    .card{background:#fff;border-radius:24px;padding:36px 32px;box-shadow:0 20px 70px rgba(0,0,0,.35)}

    /* ── School logo — displayed at native resolution (107×66 px) ── */
    .school-logo{display:block;width:107px;height:auto;margin:0 auto 10px;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges}

    /* ── Parabola badge ── */
    .parabola-badge{display:block;margin:0 auto 14px;text-align:center}

    /* ── Quick-insert buttons ── */
    .quick-btns{display:flex;gap:8px;margin-bottom:10px}
    .quick-btn{flex:1;padding:12px 0;border:2px solid #c5b8f5;border-radius:10px;
      background:#f5f0ff;color:#5c3dc7;font-size:1.2em;font-family:inherit;
      cursor:pointer;transition:background .15s;}
    .quick-btn:active{background:#e0d5ff}
    .qb-slash{font-size:1em;letter-spacing:.05em}

    h1{color:#3a1a7a;text-align:center;font-size:1.4em;margin-bottom:4px}
    .subject-line{text-align:center;color:#5c3dc7;font-size:.98em;font-weight:bold;margin-bottom:4px}
    .subtitle{color:#888;text-align:center;font-size:.9em;margin-bottom:6px}
    .greeting{text-align:center;color:#444;font-size:.92em;margin-bottom:24px;font-style:italic}

    label{display:block;color:#555;margin-bottom:8px;font-size:.95em}
    input[type="text"]{
      width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:12px;
      font-size:1.1em;font-family:inherit;transition:border-color .2s;
      text-align:right;margin-bottom:20px;
    }
    input[type="text"]:focus{outline:none;border-color:#7b2fbe}

    /* answer inputs (text type now) */
    input.ans-input{
      width:100%;padding:13px 14px;border:2px solid #e0e0e0;border-radius:12px;
      font-size:1.15em;font-family:inherit;text-align:center;direction:ltr;
      transition:border-color .2s;
    }
    input.ans-input:focus{outline:none;border-color:#7b2fbe}
    input.ans-input:disabled{background:#f5f5f5;color:#aaa}

    .btn-primary{
      width:100%;padding:16px;
      background:linear-gradient(135deg,#5c6bc0,#7b2fbe);
      color:#fff;border:none;border-radius:12px;
      font-size:1.08em;font-family:inherit;font-weight:bold;
      cursor:pointer;box-shadow:0 4px 16px rgba(123,47,190,.35);
      transition:transform .1s,box-shadow .2s;
    }
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 22px rgba(123,47,190,.45)}
    .btn-primary:active:not(:disabled){transform:translateY(0)}
    .btn-primary:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}

    .btn-outline{
      width:100%;padding:14px;background:#fff;color:#5c6bc0;
      border:2px solid #5c6bc0;border-radius:12px;
      font-size:1em;font-family:inherit;font-weight:bold;
      cursor:pointer;transition:background .2s;margin-bottom:12px;
    }
    .btn-outline:hover{background:#f0f4ff}

    .btn-no-sol{
      width:100%;padding:13px;border:2px dashed #bbb;border-radius:12px;
      background:#fff;color:#777;font-size:1em;font-family:inherit;cursor:pointer;transition:all .2s;
    }
    .btn-no-sol.selected{border-style:solid;border-color:#e53935;background:#fff5f5;color:#b71c1c;font-weight:bold}

    /* progress */
    .progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .progress-text{color:#666;font-size:.88em}
    .progress-score{color:#4527a0;font-size:.88em;font-weight:bold}
    .progress-track{background:#ede7f6;border-radius:10px;height:8px;margin-bottom:24px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#5c6bc0,#7b2fbe);border-radius:10px;transition:width .5s ease}

    /* equation box */
    .eq-box{
      border:2px solid #ddd4f7;border-radius:16px;
      padding:20px 14px;text-align:center;margin-bottom:18px;
      direction:ltr;background:#f5f0ff;transition:background .3s,border-color .3s;
    }
    .eq-box.correct{background:#f0fff4;border-color:#4caf50}
    .eq-box.wrong{background:#fff5f5;border-color:#e53935}
    .eq-text{font-size:1.75em;font-weight:bold;color:#1a0050;letter-spacing:.01em}

    /* feedback */
    .feedback-banner{
      display:none;align-items:flex-start;gap:10px;
      padding:14px 16px;border-radius:14px;margin-bottom:16px;
    }
    .feedback-banner.show-correct{display:flex;background:#e8f5e9;color:#1b5e20}
    .feedback-banner.show-wrong{display:flex;background:#ffebee;color:#b71c1c}
    .fb-icon{font-size:1.4em;flex-shrink:0;margin-top:1px}
    .fb-body{}
    .fb-main{font-size:1.15em;font-weight:bold}
    .fb-detail{font-size:.88em;margin-top:4px;direction:ltr;text-align:left;opacity:.9}

    /* answer area */
    .ans-title{color:#555;font-size:.9em;margin-bottom:12px}
    .inputs-row{display:flex;gap:12px;margin-bottom:12px}
    .input-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
    .input-label{color:#5c3dc7;font-weight:bold;font-size:1em;direction:ltr}
    .or-divider{text-align:center;color:#bbb;font-size:.88em;margin:8px 0 10px}

    /* instruction box */
    .hint-box{
      background:#f8f8ff;border:1px solid #e0d7ff;border-radius:10px;
      padding:10px 14px;font-size:.82em;color:#555;margin-top:14px;line-height:1.6;
    }
    .hint-box b{color:#4527a0}

    /* results */
    .results-top{Text-align:center;border-bottom:2px solid #f0f0f0;padding-bottom:20px;margin-bottom:20px}
    .res-emoji{font-size:2.3em;margin-bottom:4px}
    .res-name{font-size:1.2em;color:#3a1a7a;font-weight:bold;margin-bottom:10px}
    .res-score{font-size:3em;font-weight:bold;line-height:1;margin-bottom:4px}
    .res-tagline{color:#888;font-size:.9em}

    .res-list{margin-bottom:20px}
    .res-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
    .res-item-top{display:flex;align-items:center;gap:10px}
    .res-icon{font-size:1.25em;flex-shrink:0}
    .res-eq{flex:1;font-size:.88em;direction:ltr;text-align:left;color:#222;font-weight:600}
    .res-correct{font-size:.8em;color:#2e7d32;direction:ltr;text-align:left;margin-top:3px;padding-right:28px}
    .res-student{font-size:.8em;color:#b71c1c;direction:ltr;text-align:left;margin-top:1px;padding-right:28px}

    .share-row{display:flex;gap:10px;margin-bottom:12px}
    .share-row .btn-outline{margin:0;font-size:.9em}

    /* ── RESPONSIVE ── */
    @media(max-width:480px){
      .card{padding:24px 16px}
      .eq-text{font-size:1.4em}
      h1{font-size:1.25em}
      .res-score{font-size:2.4em}
      .share-row{flex-direction:column;gap:8px}
    }
    @media(max-width:360px){
      .inputs-row{flex-direction:column}
      .input-wrap{flex-direction:row;gap:8px;justify-content:center;width:100%}
      .input-label{white-space:nowrap}
      input.ans-input{max-width:140px}
    }
    @media print{
      body{background:white;padding:0}
      .card{box-shadow:none;border-radius:0}
      .share-row,.btn-primary,.btn-outline{display:none!important}
    }
  </style>
</head>

      <button class="btn-no-sol" id="no-sol-btn" onclick="toggleNoSol()">אין פתרון ממשי</button>
      <div class="hint-box">
        💡 <b>הנחיות:</b><br>
        • יש פתרון אחד — הזן/י אותו ב-x₁ בלבד<br>
        • אין פתרון ממשי — לחץ/י על הכפתור למעלה<br>
        • שבר — כתוב/י אותו בצורה <b>m/n</b>, לדוגמה: <b>1/2</b> או <b>3/5</b>
      </div>
    </div>

    <div style="height:16px"></div>
    <button class="btn-primary" id="next-btn" onclick="handleNextBtn()" disabled>הבא ←</button>
  </div>
</div>

<!-- ═══ SCREEN 3: RESULTS ═══ -->
<div id="sc-results" class="screen">
  <div class="card" id="results-card">
    <div class="results-top">
      <div class="res-emoji" id="res-emoji">🎓</div>
      <div class="res-name"    id="res-name"></div>
      <div class="res-score"   id="res-score"></div>
      <div class="res-tagline" id="res-tagline"></div>
    </div>
    <div class="res-list" id="res-list"></div>
    <div class="share-row">
      <button class="btn-outline" id="share-btn" onclick="doShare()">📤 שתף למורה</button>
      <button class="btn-outline" id="copy-btn" onclick="doCopy()">📋 העתק</button>
    </div>
    <button class="btn-primary" onclick="startNew()">🔄 10 משוואות חדשות</button>
  </div>
</div>

<script>
// ══ STATE ══
let studentName='',equations=[],current=0,log=[],runScore=0,noSolActive=false,awaitFeedback=false;

// ══ UTILITIES ══
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){const t=b;b=a%b;a=t}return a}

function fmtNum(x){
  if(x===null||isNaN(x))return'?';
  if(Number.isInteger(x))return String(x);
  for(let d=2;d<=30;d++){
    const n=Math.round(x*d);
    if(Math.abs(n/d-x)<0.00001){
      const g=gcd(Math.abs(n),d);
      const rn=n/g,rd=d/g;
      if(rd===1)return String(rn);
      return rn+'/'+rd;
    }
  }
  return x.toFixed(4);
}

function fmtCorrect(eq){
  if(eq.type==='none')return'אין פתרון ממשי';
  if(eq.type==='one')return'x = '+fmtNum(eq.solutions[0]);
  return'x₁ = '+fmtNum(eq.solutions[0])+'  ,  x₂ = '+fmtNum(eq.solutions[1]);
}

function fmtStudentAns(sAns){
  if(sAns.noSol)return'אין פתרון ממשי';
  const vals=[sAns.v1,sAns.v2].filter(v=>v!==null&&!isNaN(v));
  if(!vals.length)return'(לא הוזנה תשובה)';
  return vals.map((v,i)=>(vals.length>1?'x'+(i===0?'₁':'₂'):'')+' = '+fmtNum(v)).join('  ,  ');
}

// ══ ANSWER PARSING (supports fractions like 3/5) ══
function parseAnswer(str){
  if(!str||str.trim()==='')return null;
  str=str.trim().replace(/\s/g,'');
  const fr=str.match(/^(-?\d+)\/(-?\d+)$/);
  if(fr){const n=parseInt(fr[1]),d=parseInt(fr[2]);return d===0?null:n/d}
  const v=parseFloat(str);
  return isNaN(v)?null:v;
}

// ══ QUICK-INSERT HELPERS ══
function qbInsert(ch){
  const focus=[document.getElementById('ans1'),document.getElementById('ans2')];
  const active=focus.find(el=>el===document.activeElement)||focus[0];
  if(!active||active.disabled)return;
  const s=active.selectionStart,e=active.selectionEnd,v=active.value;
  active.value=v.slice(0,s)+ch+v.slice(e);
  active.setSelectionRange(s+1,s+1);
  onAnsChange();
}
function qbDelete(){
  const focus=[document.getElementById('ans1'),document.getElementById('ans2')];
  const active=focus.find(el=>el===document.activeElement)||focus[0];
  if(!active||active.disabled)return;
  const s=active.selectionStart,e=active.selectionEnd,v=active.value;
  if(s!==e){active.value=v.slice(0,s)+v.slice(e);active.setSelectionRange(s,s);}
  else if(s>0){active.value=v.slice(0,s-1)+v.slice(s);active.setSelectionRange(s-1,s-1);}
  onAnsChange();
}

// ══ GENERATORS ══
// 1. x=0 and one non-zero integer
function genZeroAndInt(){
  for(let t=0;t<3000;t++){
    const k=rnd(-5,5);if(k===0)continue;
    const a=rnd(1,3);
    const b=-a*k,c=0;
    if(Math.abs(b)>12)continue;
    return{a,b,c,solutions:[Math.min(0,k),Math.max(0,k)],type:'two'};
  }
  return{a:1,b:-3,c:0,solutions:[0,3],type:'two'};
}
// 2. x=0 and one non-zero irreducible fraction
function genZeroAndFrac(){
  for(let t=0;t<5000;t++){
    const q=rnd(2,4),p=rnd(-6,6);if(p===0)continue;
    if(gcd(Math.abs(p),q)!==1)continue;
    const a=q,b=-p,c=0;
    if(Math.abs(b)>10)continue;
    const fr=p/q;
    return{a,b,c,solutions:[Math.min(0,fr),Math.max(0,fr)],type:'two'};
  }
  return{a:2,b:-1,c:0,solutions:[0,0.5],type:'two'};
}
// 3. Two non-zero integer solutions
function genTwoInts(){
  for(let t=0;t<3000;t++){
    const a=rnd(-3,3);if(!a)continue;
    const x1=rnd(-5,5),x2=rnd(-5,5);
    if(x1===x2||x1===0||x2===0)continue;
    const b=-a*(x1+x2),c=a*x1*x2;
    if(Math.abs(b)>12||Math.abs(c)>12)continue;
    return{a,b,c,solutions:[Math.min(x1,x2),Math.max(x1,x2)],type:'two'};
  }
  return{a:1,b:-5,c:6,solutions:[2,3],type:'two'};
}
// 4. One integer + one irreducible fraction
function genIntAndFrac(){
  for(let t=0;t<5000;t++){
    const q=rnd(2,3),p=rnd(-5,5);if(p===0)continue;
    if(gcd(Math.abs(p),q)!==1)continue;
    const k=rnd(-4,4);
    if(p===k*q)continue;
    const a=q,b=-(p+k*q),c=k*p;
    if(Math.abs(a)>10||Math.abs(b)>12||Math.abs(c)>12)continue;
    if(b===0&&c===0)continue;
    const fr=p/q;
    return{a,b,c,solutions:[Math.min(fr,k),Math.max(fr,k)],type:'two'};
  }
  return{a:2,b:-5,c:2,solutions:[0.5,2],type:'two'};
}
// 5. Two irreducible fractions
function genTwoFracs(){
  for(let t=0;t<8000;t++){
    const q1=rnd(2,4),p1=rnd(-6,6);if(p1===0)continue;
    if(gcd(Math.abs(p1),q1)!==1)continue;
    const q2=rnd(2,4),p2=rnd(-6,6);if(p2===0)continue;
    if(gcd(Math.abs(p2),q2)!==1)continue;
    if(p1*q2===p2*q1)continue;
    const a=q1*q2,b=-(p2*q1+p1*q2),c=p1*p2;
    if(Math.abs(a)>12||Math.abs(b)>16||Math.abs(c)>16)continue;
    if(b===0&&c===0)continue;
    const f1=p1/q1,f2=p2/q2;
    return{a,b,c,solutions:[Math.min(f1,f2),Math.max(f1,f2)],type:'two'};
  }
  return{a:4,b:-5,c:1,solutions:[0.25,1],type:'two'};
}
function genNone(){
  for(let t=0;t<3000;t++){
    const a=rnd(1,5),b=rnd(-8,8),c=rnd(1,8);
    if(b*b-4*a*c<0)return{a,b,c,solutions:[],type:'none'};
  }
  return{a:1,b:0,c:1,solutions:[],type:'none'};
}

// ══ BUILD 10 EQUATIONS: exact mix ══
function makeEquations(){
  const used=new Set();
  function pick(fn){
    for(let i=0;i<500;i++){
      const eq=fn();const k=eq.a+','+eq.b+','+eq.c;
      if(!used.has(k)){used.add(k);return eq}
    }
    const eq=fn();used.add(eq.a+','+eq.b+','+eq.c);return eq;
  }
  return shuffle([
    pick(genZeroAndInt),
    pick(genZeroAndFrac),
    pick(genNone),
    pick(genNone),
    pick(genTwoInts),
    pick(genTwoInts),
    pick(genTwoInts),
    pick(genIntAndFrac),
    pick(genIntAndFrac),
    pick(genTwoFracs),
  ]);
}

// ══ FORMAT EQUATION ══
function fmt(a,b,c){
  let s='';
  if(a===1)s='x²';else if(a===-1)s='−x²';else if(a<0)s=a+'x²';else s=a+'x²';
  if(b===1)s+=' + x';else if(b===-1)s+=' − x';else if(b>0)s+=' + '+b+'x';else if(b<0)s+=' − '+Math.abs(b)+'x';
  if(c>0)s+=' + '+c;else if(c<0)s+=' − '+Math.abs(c);
  return s+' = 0';
}

// ══ CHECK ANSWER ══
const TOL=0.01;
const near=(v,x)=>Math.abs(v-x)<TOL;
function check(eq,sAns){
  if(eq.type==='none')return sAns.noSol;
  if(sAns.noSol)return false;
  const vals=[sAns.v1,sAns.v2].filter(v=>v!==null&&!isNaN(v));
  if(eq.type==='one'){if(!vals.length)return false;return vals.every(v=>near(v,eq.solutions[0]))}
  if(eq.type==='two'){
    if(vals.length<2)return false;
    const[x1,x2]=eq.solutions;
    return(near(vals[0],x1)&&near(vals[1],x2))||(near(vals[0],x2)&&near(vals[1],x1));
  }
  return false;
}

// ══ SCREENS ══
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}

// ══ QUESTION FLOW ══
function showQuestion(){
  awaitFeedback=false;
  const eq=equations[current];
  document.getElementById('prog-label').textContent='שאלה '+(current+1)+' מתוך 10';
  document.getElementById('prog-score').textContent='✓ '+runScore;
  document.getElementById('prog-bar').style.width=(current*10)+'%';
  document.getElementById('eq-display').textContent=fmt(eq.a,eq.b,eq.c);
  document.getElementById('eq-box').className='eq-box';
  document.getElementById('feedback-banner').className='feedback-banner';
  const ansArea=document.getElementById('ans-area');
  ansArea.style.display='block';ansArea.style.opacity='1';
  const a1=document.getElementById('ans1'),a2=document.getElementById('ans2');
  a1.value='';a1.disabled=false;a2.value='';a2.disabled=false;
  noSolActive=false;
  const nsb=document.getElementById('no-sol-btn');nsb.classList.remove('selected');nsb.textContent='אין פתרון ממשי';
  const nb=document.getElementById('next-btn');nb.disabled=true;nb.textContent='הבא ←';
  setTimeout(()=>a1.focus(),80);
}

function onAnsChange(){
  if(awaitFeedback)return;
  const a1=document.getElementById('ans1').value.trim();
  const a2=document.getElementById('ans2').value.trim();
  document.getElementById('next-btn').disabled=!(a1||a2);
}

function toggleNoSol(){
  if(awaitFeedback)return;
  noSolActive=!noSolActive;
  const nsb=document.getElementById('no-sol-btn');
  const aa=document.getElementById('ans-area');
  const a1=document.getElementById('ans1'),a2=document.getElementById('ans2');
  if(noSolActive){
    nsb.classList.add('selected');nsb.textContent='✓ אין פתרון ממשי (נבחר)';
    aa.style.opacity='.35';a1.value='';a1.disabled=true;a2.value='';a2.disabled=true;
    document.getElementById('next-btn').disabled=false;
  }else{
    nsb.classList.remove('selected');nsb.textContent='אין פתרון ממשי';
    aa.style.opacity='1';a1.disabled=false;a2.disabled=false;
    document.getElementById('next-btn').disabled=true;
  }
}

function handleNextBtn(){if(awaitFeedback)continueAfterFeedback();else submitAnswer()}

function submitAnswer(){
  const v1=parseAnswer(document.getElementById('ans1').value);
  const v2=parseAnswer(document.getElementById('ans2').value);
  const sAns={noSol:noSolActive,v1,v2};
  const eq=equations[current];
  const correct=check(eq,sAns);
  if(correct)runScore++;
  log.push({eq,sAns,correct});
  current++;
  showFeedback(correct,eq,sAns);
}

function showFeedback(correct,eq,sAns){
  awaitFeedback=true;
  document.getElementById('eq-box').className='eq-box '+(correct?'correct':'wrong');
  const fb=document.getElementById('feedback-banner');
  document.getElementById('fb-icon').textContent=correct?'✅':'❌';
  document.getElementById('fb-main').textContent=correct?'נכון!':'לא נכון';
  if(!correct){
    document.getElementById('fb-detail').textContent='התשובה הנכונה: '+fmtCorrect(eq);
  }else{
    document.getElementById('fb-detail').textContent='';
  }
  fb.className='feedback-banner '+(correct?'show-correct':'show-wrong');
  document.getElementById('ans-area').style.display='none';
  const nb=document.getElementById('next-btn');
  nb.disabled=false;nb.textContent=(current>=10)?'לתוצאות →':'המשך →';
}

function continueAfterFeedback(){if(current>=10)showResults();else showQuestion()}

// ══ RESULTS ══
function showResults(){
  const s=runScore;
  let emoji,tagline,colour;
  if(s===10){emoji='🌟';tagline='מושלם! כל הכבוד!';colour='#1b5e20'}
  else if(s>=8){emoji='⭐';tagline='מצוין!';colour='#2e7d32'}
  else if(s>=7){emoji='👍';tagline='טוב מאוד';colour='#558b2f'}
  else if(s>=5){emoji='📚';tagline='כדאי לחזור על החומר';colour='#f57c00'}
  else{emoji='💪';tagline='יש להמשיך לתרגל';colour='#c62828'}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-name').textContent=studentName;
  document.getElementById('res-score').textContent=s+'/10';
  document.getElementById('res-score').style.color=colour;
  document.getElementById('res-tagline').textContent=tagline;

  const listEl=document.getElementById('res-list');listEl.innerHTML='';
  log.forEach((entry,i)=>{
    const div=document.createElement('div');div.className='res-item';
    const top=document.createElement('div');top.className='res-item-top';
    const icon=document.createElement('span');icon.className='res-icon';icon.textContent=entry.correct?'✅':'❌';
    const eq=document.createElement('div');eq.className='res-eq';eq.textContent=(i+1)+'. '+fmt(entry.eq.a,entry.eq.b,entry.eq.c);
    top.appendChild(icon);top.appendChild(eq);div.appendChild(top);
    // Always show correct answer
    const corr=document.createElement('div');corr.className='res-correct';
    corr.textContent='✔ '+fmtCorrect(entry.eq);
    div.appendChild(corr);
    // If wrong, also show student answer
    if(!entry.correct){
      const stu=document.createElement('div');stu.className='res-student';
      stu.textContent='✗ תשובתך: '+fmtStudentAns(entry.sAns);
      div.appendChild(stu);
    }
    listEl.appendChild(div);
  });
  document.getElementById('prog-bar').style.width='100%';
  show('sc-results');
}

// ══ SHARE / COPY ══
function buildText(){
  const date=new Date().toLocaleDateString('he-IL');
  let t='📐 תרגול משוואות ריבועיות\n';
  t+='מתמטיקה ט׳ א׳1 — תשפ״ו\n';
  t+='━━━━━━━━━━━━━━━━━━━━\n';
  t+='תלמיד/ה: '+studentName+'\n';
  t+='תוצאה:   '+runScore+'/10\n';
  t+='תאריך:   '+date+'\n';
  t+='━━━━━━━━━━━━━━━━━━━━\n';
  log.forEach((e,i)=>{
    t+=(e.correct?'✓':'✗')+' '+(i+1)+'. '+fmt(e.eq.a,e.eq.b,e.eq.c)+'\n';
    t+='   תשובה נכונה: '+fmtCorrect(e.eq)+'\n';
    if(!e.correct)t+='   תשובתך: '+fmtStudentAns(e.sAns)+'\n';
  });
  return t;
}
function doShare(){
  var card=document.getElementById('results-card');
  var btn=document.getElementById('share-btn');
  var origTxt=btn.textContent;
  btn.textContent='…';
  btn.disabled=true;
  html2canvas(card,{
    scale:2,
    backgroundColor:'#ffffff',
    useCORS:true,
    ignoreElements:function(el){return el.classList&&el.classList.contains('share-row');}
  }).then(function(canvas){
    canvas.toBlob(function(blob){
      btn.textContent=origTxt;
      btn.disabled=false;
      var file=new File([blob],'mishvaot_results.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({
          title:'תוצאות תרגול משוואות ריבועיות',
          text:'שלום! סיימתי את דף התרגול',
          files:[file]
        }).catch(function(){downloadImg(blob);});
      }else{
        downloadImg(blob);
      }
    },'image/png');
  }).catch(function(err){
    btn.textContent=origTxt;
    btn.disabled=false;
    var text=buildText();
    if(navigator.share){navigator.share({title:'תוצאות',text:text}).catch(function(){fallbackCopy(text);});}
    else{fallbackCopy(text);alert('התוצאות הועתקו ללוח!');}
  });
}
function downloadImg(blob){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mishvaot_results.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},10000);
}
function doCopy(){
  fallbackCopy(buildText());
  const btn=document.getElementById('copy-btn');const orig=btn.textContent;
  btn.textContent='✓ הועתק!';setTimeout(()=>{btn.textContent=orig},2200);
}
function fallbackCopy(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).catch(()=>legacyCopy(text))}
  else legacyCopy(text);
}
function legacyCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
}

// ══ START / RESTART ══
function startExercise(){
  studentName=document.getElementById('name-input').value.trim();
  equations=makeEquations();current=0;log=[];runScore=0;
  show('sc-eq');showQuestion();
}
function startNew(){equations=makeEquations();current=0;log=[];runScore=0;show('sc-eq');showQuestion()}

// ══ KEYBOARD ══
document.getElementById('name-input').addEventListener('input',function(){
  document.getElementById('start-btn').disabled=this.value.trim().length<2;
});
document.getElementById('name-input').addEventListener('keypress',function(e){
  if(e.key==='Enter'&&!document.getElementById('start-btn').disabled)startExercise();
});
document.getElementById('ans1').addEventListener('keypress',function(e){
  if(e.key==='Enter')document.getElementById('ans2').focus();
});
document.getElementById('ans2').addEventListener('keypress',function(e){
  if(e.key==='Enter'&&!document.getElementById('next-btn').disabled)handleNextBtn();
});
</script>
